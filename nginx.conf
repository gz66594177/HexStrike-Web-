worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    # Remove below header to avoid exposing PHP version (uncomment if using PHP)
    # fastcgi_hide_header X-Powered-By;

    # Rate limiting (optional, uncomment to enable)
    # limit_req_zone $binary_remote_addr zone=scan:10m rate=10r/s;

    # Upstream for the web app
    upstream hexstrike_web {
        server hexstrike-web:8000;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name _; # Replace with your domain or use _ for catch-all
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _; # Replace with your domain

        # SSL certificates (mounted via Docker volume)
        ssl_certificate /etc/letsencrypt/live/hexstrike-web/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hexstrike-web/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/hexstrike-web/chain.pem;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Logs
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # WebSocket support
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # Health check endpoint (adjust as needed)
        location /api/health {
            proxy_pass http://hexstrike-web:8000/docs; # FastAPI docs endpoint
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Main application
        location / {
            proxy_pass http://hexstrike_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout  86400;
            proxy_send_timeout  86400;

            # Rate limiting (uncomment if enabled above)
            # limit_req zone=scan burst=20 nodelay;
        }
    }
}