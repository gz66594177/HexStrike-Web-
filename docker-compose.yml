version: '3.8'

services:
  hexstrike-web:
    image: hexstrikeai/hexstrike-web:latest  # Replace with your actual image
    container_name: hexstrike-web
    restart: unless-stopped
    ports:
      - "8000:8000"  # Expose internal port for Nginx to proxy
    volumes:
      - ./app:/app  # Mount your application code
      - ./logs:/app/logs  # Optional: mount logs directory
    environment:
      - ENV=production
      # Add any other environment variables your app needs
      # - DATABASE_URL=...
      # - SECRET_KEY=...

  nginx:
    image: nginx:alpine
    container_name: hexstrike-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./logs/nginx:/var/log/nginx  # Optional: persist nginx logs
    depends_on:
      - hexstrike-web

  certbot:
    image: certbot/certbot
    container_name: hexstrike-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c"
    # Certbot will be executed via the deploy script or cron

volumes:
  certbot-etc:
  certbot-www: